<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Treinamentos PEP - Control</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .card {
            background-color: #ffffff;
            width: 520px;
            max-width: 94%;
            padding: 40px 30px 35px;
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.10);
            text-align: center;
            border: 1px solid #e9edf4;
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        .logo {
            max-width: 180px;
            width: 100%;
            height: auto;
            margin-bottom: 20px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            color: #1a2634;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }

        .subtitulo {
            color: #6b7a8a;
            font-size: 14px;
            margin-bottom: 28px;
            border-bottom: 1px solid #eef2f7;
            padding-bottom: 18px;
        }

        .lista-links {
            list-style: none;
            text-align: left;
            padding: 0;
        }

        .lista-links li {
            margin-bottom: 12px;
            padding: 10px 14px;
            background-color: #f8faff;
            border-radius: 12px;
            border: 1px solid #eef2f7;
            transition: background 0.15s, border-color 0.15s;
        }

        .lista-links li:hover {
            background-color: #f0f5ff;
            border-color: #b6c8e0;
        }

        .lista-links li a {
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            color: #1e2a41;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .lista-links li a::before {
            content: "📄";
            font-size: 18px;
        }

        .lista-links li a:hover {
            color: #0052b3;
        }

        .footer {
            margin-top: 28px;
            font-size: 12px;
            color: #a0b0c0;
            border-top: 1px solid #eef2f7;
            padding-top: 18px;
        }

        @media (max-width: 480px) {
            .card {
                padding: 28px 18px 24px;
            }
            .logo {
                max-width: 130px;
            }
            h1 {
                font-size: 19px;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="assets/img/logo-control.png" alt="Logo Control" class="logo" />
        <h1>📘 Treinamentos PEP</h1>
        <p class="subtitulo">Clique nos títulos abaixo para abrir os PDFs</p>

        <ul class="lista-links">
            <li>
                <a href="IT%20N%C2%BA%20333/">
                    IT Nº 333 - Atender Contigência de Derramamento de Óleo Isolante em SED
                </a>
            </li>
            <li>
                <a href="NORMA%20ESTOQUE%20ANONIMO/">
                    NORMA GESTÃO DE ESTOQUE ANONIMO
                </a>
            </li>
            <li>
                <a href="NORMA%20INVENT%C3%81RIO%20DE%20MATERIAIS/">
                    NORMA INVENTÁRIO DE MATERIAIS - Versão 2023
                </a>
            </li>
        </ul>

        <div class="footer">
            Control · Treinamentos e Normas
        </div>
    </div>

</body>
</html>
